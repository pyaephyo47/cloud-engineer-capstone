name: "Terraform CI/CD"

# Trigger settings
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # 🎯 Allows version tags (e.g., v1.0) to kick off the deployment phase
    paths: 
      - 'terraform/**' # 🎯 ONLY wakes up if files inside the terraform folder change

jobs:
  # JOB 1: Verify code layout and generate dry-run preview (Runs on every push)
  terraform_plan:
    name: "Verify Code and Preview Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.4"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

  # JOB 2: Execute Automated Deployment (Runs ONLY when you push a version tag)
  terraform_apply:
    name: "Execute Automated Deployment"
    needs: terraform_plan # 🛡️ Safety belt: Apply only runs if the Plan job passes flawlessly!
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # 🎯 Enforces tag-only deployments

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.4"

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      - name: Terraform Apply
        # 🏎️ -auto-approve bypasses manual "yes" prompts silently inside the cloud runner
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

